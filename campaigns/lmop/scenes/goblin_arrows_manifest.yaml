entry: scene_01
scenes:
- id: scene_01
  title: 'บทที่ 1: ลูกศรของก๊อบลิน'
  description: ในเมืองเนเวอร์วินเทอร์ ดวอร์ฟนามว่า กันเดรน ร็อคซีคเกอร์ ได้ขอให้พวกคุณนำเกวียนบรรทุกเสบียงและอุปกรณ์จำเป็นไปส่งที่เมืองห่างไกลทุรกันดาลที่ชื่อแฟนดูลิน ห่างจากเมืองไปทางตะวันออกเฉียงใต้สองสามวัน เห็นได้ชัดว่ากันเดรนรู้สึกตื่นเต้นมากและเหตุผลในการเดินทางของเขาก็ดูเป็นความลับอยู่ในครั้งนี้ เขาเพียงบอกว่าเขาและพี่น้องได้พบกับ “บางอย่างที่ใหญ่มาก” และเขาจะจ่ายให้พวกคุณคนละ 10 เหรียญทอง (GP) ในภารกิจอารักขาเกวียนขนส่งของไปที่ร้านเสบียงของบาร์เทน จุดซื้อขายเสบียงและอุปกรณ์ในเมืองแฟนดูลินอย่างปลอดภัย เขาได้ขี่ม้าล่วงหน้าไปก่อนแล้วพร้อมกับนักรบคุ้มกันชื่อ ซิลดาร์ ฮอลวินเทอร์ บอกไว้เพียงว่าพวกเขาต้องไปก่อนเพื่อ “จัดการธุระ” พวกคุณใช้เวลาไปสองสามวันในการเดินทางลงใช้ไปตามถนนไฮโรด (High Road) จากเนเวอร์วินเทอร์ และคุณก็เพิ่งจะเลี้ยวมาทางตะวันออกตามทางเกวียนไตรบอร์ (Triboar Trail) ตลอดเส้นทางก็ปลอดภัยดี แต่พื้นที่แถบนี้ก็อาจมีอันตรายเกิดขึ้นได้ เป็นที่รู้กันว่าโจรและพวกนอกกฏหมายชอบดักซุ่มอยู่บนทางเกวียนนี้
  entities: []
  next: scene_02
- id: scene_02
  title: ก๊อบลินซุ่มโจมตี
  description: คุณอยู่บนทางเกวียนไตรบอร์มาราวครึ่งวัน เมื่อคุณถึงทางโค้ง คุณก็สังเกตเห็นม้าตายสองตัวอยู่ด้านหน้าของคุณห่างไปราว 50 ฟุต ขวางทางอยู่ แต่ละตัวมีลูกธนูสีดำปักติดอยู่ ไม้ป่าบีบทางตรงนี้ให้แคบลงและมีพุ่มไม้หนาทั้งสองข้างทาง
  entities: []
  next: scene_03
- id: scene_03
  title: ที่ซ่อนของแคร็กมาว
  description: '#### แผนที่การผจญภัย แผนที่ที่ปรากฏในการผจญภัยนี้สำหรับ DM เท่านั้น แผนที่ไม่เพียงแต่แสดงภาพของพื้นที่ทั้งหมด แต่ยังแสดงถึงประตูลับ, กับดักที่ซ่อนไว้, และสิ่งอื่น ๆ ที่ผู้เล่นไม่ควรจะได้รู้ก่อนเพื่อให้เป็นความลับในการเล่น แผนที่จะเหมาะกับการแสดงรังที่มีหลายห้องและสถานที่อื่นที่มีหลายจุดที่ต้องให้สำรวจ เพราะฉะนั้นไม่จำเป็นว่าทุกสถานที่จะต้องมีแผนที่ เมื่อผู้เล่นมาถึงสถานที่ที่กำหนดไว้บนแผนที่ คุณสามารถใช้เพียงการบรรยายเพื่ออธิบายลักษณะของสถานที่ หรือคุณจะวาดสิ่งที่พวกเขาเห็นบนกระดาษกราฟแยกออกไปให้ดู ก๊อบปี้จากแผนที่ของคุณแต่ละรายละเอียดตามที่เหมาะสม ***อัตราส่วนและเส้นตาราง*** อัตราส่วนจะช่วยให้คุณวัดระยะและมิติได้อย่างแม่นยำ ซึ่งจำเป็นต่อการจัดการต่อสู้, ผลจากเวทย์มนต์ และแหล่งกำเนิดแสงที่มีต่อสิ่งต่าง ๆ แผนที่ภายในสถานที่จะใช้เส้นตารางที่มีขนาดด้านละ 5 ฟุตหรือ 10 ฟุต ***ดอกเข็มทิศ (Compass Rose)*** ดอกเข็มทิศจะมีประโยชน์เมื่อคุณอธิบายสถานที่ เช่น คุณอาจจะบอกผู้เล่นว่า “มีถังไม้วางไว้ข้างกำแพงทางทิศเหนือ” หรือ “บันไดทอดตัวลงไปด้านล่างทางทิศตะวันตก”'
