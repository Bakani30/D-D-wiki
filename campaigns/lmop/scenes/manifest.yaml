      คุณก็สังเกตเห็นม้าตายสองตัวอยู่ด้านหน้าห่างไปราว 50 ฟุต ขวางทางอยู่
      แต่ละตัวมีลูกธนูสีดำปักติดอยู่ ไม้ป่าบีบทางตรงนี้ให้แคบลงและมีพุ่มไม้หนาทั้งสองข้างทาง
