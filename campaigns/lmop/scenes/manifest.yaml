entry: scene_02

scenes:

  # ── Scene 1: Intro / journey briefing (no combat) ───────────────────────────
  - id: scene_01
    title: "บทที่ 1: ลูกศรของก๊อบลิน"
    description: >
      ในเมืองเนเวอร์วินเทอร์ ดวอร์ฟนามว่า กันเดรน ร็อคซีคเกอร์ ได้ขอให้พวกคุณนำเกวียนบรรทุกเสบียงและอุปกรณ์จำเป็น
      ไปส่งที่เมืองแฟนดูลิน ห่างไปทางตะวันออกเฉียงใต้สองสามวัน กันเดรนจะจ่ายให้คนละ 10 GP
      เพื่ออารักขาเกวียนไปที่ร้านเสบียงของบาร์เทนอย่างปลอดภัย
      เขาขี่ม้าล่วงหน้าไปพร้อมกับซิลดาร์ ฮอลวินเทอร์เพื่อ "จัดการธุระ"
    entities: []
    next: scene_02

  # ── Scene 2: Goblin Ambush — COMBAT ─────────────────────────────────────────
  - id: scene_02
