    description: >
      ถ้ำปากกว้างท่ามกลางหินผา มีร่องรอยก็อบลินนับสิบตัวอาศัยอยู่ภายใน
      เสียงน้ำไหลจากลำธารเล็กๆ ทางเหนือ กลิ่นควันไฟและกลิ่นสัตว์โชยมา
